version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: budget_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: budget
    volumes:
      - mongo_data:/data/db
    networks:
      - budget_net

  backend:
    build: ./backend
    container_name: budget_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    networks:
      - budget_net

  telegram-bot:
    build: ./telegram-bot
    container_name: budget_tgbot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    networks:
      - budget_net

  frontend:
    build: ./frontend
    container_name: budget_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - budget_net

volumes:
  mongo_data:


networks:
  budget_net:
    driver: bridge
